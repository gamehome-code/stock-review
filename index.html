<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d1117">
  <title>A股复盘助手</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="/css/style.css">
  <!-- ECharts -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script>
    // 清除旧版Service Worker缓存，确保加载最新代码
    if ('serviceWorker' in navigator) {
      caches.keys().then(keys => {
        keys.forEach(k => { if (k !== 'stock-review-v2') caches.delete(k); });
      });
      navigator.serviceWorker.register('/sw.js').then(reg => {
        reg.update();
      });
    }
  </script>
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <h1>📈 A股复盘助手</h1>
  </header>

  <!-- Main Content -->
  <main class="main-content">

    <!-- ===== 页面1: 行情回顾 ===== -->
    <div id="page-market" class="page active">
      <!-- 大盘指数 -->
      <div id="index-grid" class="index-grid">
        <div class="loading"><div class="spinner"></div>加载中...</div>
      </div>

      <!-- 板块涨跌 -->
      <div class="card">
        <div class="card-title">
          <span class="icon">🏭</span> 板块涨跌
        </div>
        <div class="tabs">
          <div class="tab sector-tab active" data-type="industry">行业</div>
          <div class="tab sector-tab" data-type="concept">概念</div>
        </div>
        <div id="sector-list">
          <div class="loading"><div class="spinner"></div>加载中...</div>
        </div>
      </div>

      <!-- 涨停跌停 -->
      <div class="card">
        <div class="card-title">
          <span class="icon">🚀</span> 涨停 / 跌停
        </div>
        <div class="tabs">
          <div class="tab limit-tab active" data-type="zt">涨停板</div>
          <div class="tab limit-tab" data-type="dt">跌停板</div>
        </div>
        <div id="limit-list">
          <div class="loading"><div class="spinner"></div>加载中...</div>
        </div>
      </div>
    </div>

    <!-- ===== 页面2: 技术分析 ===== -->
    <div id="page-technical" class="page">
      <!-- 搜索栏 -->
      <div style="position:relative">
        <div class="search-bar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="stock-search" placeholder="搜索股票名称或代码...">
        </div>
        <div id="search-results" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--bg-card);border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);max-height:300px;overflow-y:auto;z-index:50"></div>
      </div>

      <!-- K线类型 -->
      <div class="tabs">
        <div class="tab kline-tab active" data-type="101">日K</div>
        <div class="tab kline-tab" data-type="102">周K</div>
        <div class="tab kline-tab" data-type="103">月K</div>
      </div>

      <!-- 实时行情 -->
      <div id="stock-quote"></div>

      <!-- K线图 -->
      <div class="card" style="padding:8px">
        <div id="kline-chart" class="chart-container chart-container-lg">
          <div class="loading"><div class="spinner"></div>选择股票查看K线</div>
        </div>
      </div>

      <!-- 资金流向 -->
      <div class="card" id="money-flow">
        <div class="card-title">
          <span class="icon">💰</span> 资金流向（近10日）
        </div>
        <div id="money-flow-chart" style="height:200px"></div>
      </div>
    </div>

    <!-- ===== 页面3: 基本面分析 ===== -->
    <div id="page-fundamental" class="page">
      <!-- 搜索栏 -->
      <div style="position:relative">
        <div class="search-bar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="fund-search" placeholder="搜索股票查看基本面..." value="贵州茅台">
        </div>
        <div id="fund-search-results" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--bg-card);border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);max-height:300px;overflow-y:auto;z-index:50"></div>
      </div>

      <!-- 基本面内容 -->
      <div id="fundamental-content">
        <div class="loading"><div class="spinner"></div>加载中...</div>
      </div>

      <!-- 估值趋势 -->
      <div class="card">
        <div class="card-title">
          <span class="icon">📈</span> 估值趋势（近12月）
        </div>
        <div id="valuation-chart" style="height:250px"></div>
      </div>
    </div>

    <!-- ===== 页面4: 交易日志 ===== -->
    <div id="page-tradelog" class="page">
      <!-- 盈亏概览 -->
      <div id="trade-summary" class="trade-summary">
        <div class="summary-item"><div class="summary-label">持仓盈亏</div><div class="summary-value">--</div></div>
        <div class="summary-item"><div class="summary-label">盈亏比例</div><div class="summary-value">--</div></div>
        <div class="summary-item"><div class="summary-label">胜率</div><div class="summary-value">--</div></div>
      </div>

      <!-- 当前持仓 -->
      <div class="card">
        <div class="card-title">
          <span class="icon">📦</span> 当前持仓
        </div>
        <div id="position-list">
          <div class="empty-state">暂无持仓</div>
        </div>
      </div>

      <!-- 盈亏曲线 -->
      <div class="card">
        <div class="card-title">
          <span class="icon">📊</span> 盈亏曲线
        </div>
        <div id="pnl-chart" style="height:200px">
          <div class="empty-state">完成交易后查看</div>
        </div>
      </div>

      <!-- 交易历史 -->
      <div class="card">
        <div class="card-title" style="justify-content:space-between">
          <span><span class="icon">📝</span> 交易记录</span>
          <div style="display:flex;gap:6px">
            <button class="btn btn-sm" id="export-btn" style="background:var(--bg-input);color:var(--text-secondary)">导出</button>
            <label class="btn btn-sm" style="background:var(--bg-input);color:var(--text-secondary);cursor:pointer">
              导入
              <input type="file" id="import-input" accept=".json" style="display:none">
            </label>
          </div>
        </div>
        <div id="trade-history">
          <div class="empty-state">暂无交易记录</div>
        </div>
      </div>

      <!-- 策略回测 -->
      <div class="card">
        <div class="card-title">
          <span class="icon">🧪</span> 策略回测
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">股票代码</label>
            <input type="text" id="backtest-code" class="form-input" placeholder="如 600519">
          </div>
          <div class="form-group">
            <label class="form-label">策略</label>
            <select id="backtest-strategy" class="form-select">
              <option value="ma-cross">均线交叉(MA5/MA20)</option>
            </select>
          </div>
        </div>
        <button class="btn btn-primary btn-block" id="run-backtest">运行回测</button>
        <div id="backtest-result" style="margin-top:12px"></div>
      </div>

      <!-- 添加交易按钮 -->
      <button class="btn btn-primary btn-block" id="add-trade-btn" style="margin-top:8px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        添加交易
      </button>
    </div>

    <!-- ===== 页面5: 全球情绪 ===== -->
    <div id="page-sentiment" class="page">
      <!-- 综合情绪指数 -->
      <div id="sentiment-score">
        <div class="loading"><div class="spinner"></div>计算中...</div>
      </div>

      <!-- VIX -->
      <div id="vix-card">
        <div class="loading"><div class="spinner"></div>加载中...</div>
      </div>

      <!-- 北向资金 -->
      <div id="north-flow">
        <div class="loading"><div class="spinner"></div>加载中...</div>
      </div>

      <!-- 全球指数 -->
      <div id="global-indices">
        <div class="loading"><div class="spinner"></div>加载中...</div>
      </div>
    </div>

  </main>

  <!-- 交易记录弹窗 -->
  <div class="modal-overlay" id="trade-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">添加交易</span>
        <button class="modal-close" id="close-modal">&times;</button>
      </div>
      <form id="trade-form">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">股票名称</label>
            <input type="text" name="name" class="form-input" placeholder="如 贵州茅台" required>
          </div>
          <div class="form-group">
            <label class="form-label">股票代码</label>
            <input type="text" name="code" class="form-input" placeholder="如 600519" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">买卖方向</label>
            <select name="type" class="form-select">
              <option value="buy">买入</option>
              <option value="sell">卖出</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">日期</label>
            <input type="date" name="date" class="form-input" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">成交价格</label>
            <input type="number" name="price" class="form-input" step="0.01" placeholder="0.00" required>
          </div>
          <div class="form-group">
            <label class="form-label">成交数量（股）</label>
            <input type="number" name="shares" class="form-input" step="100" placeholder="100" required>
          </div>
        </div>
        <button type="button" class="btn btn-primary btn-block" id="submit-trade" style="margin-top:8px">确认</button>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a class="nav-item active" data-page="market">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 3v18h18"/><path d="M7 16l4-8 4 4 4-6"/>
      </svg>
      <span>行情</span>
    </a>
    <a class="nav-item" data-page="technical">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M3 9h18M9 3v18"/>
      </svg>
      <span>技术</span>
    </a>
    <a class="nav-item" data-page="fundamental">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <path d="M14 2v6h6"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
      <span>基本面</span>
    </a>
    <a class="nav-item" data-page="tradelog">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/>
      </svg>
      <span>交易</span>
    </a>
    <a class="nav-item" data-page="sentiment">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
      </svg>
      <span>情绪</span>
    </a>
  </nav>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/market.js"></script>
  <script src="/js/technical.js"></script>
  <script src="/js/fundamental.js"></script>
  <script src="/js/trade-log.js"></script>
  <script src="/js/sentiment.js"></script>
  <script src="/js/app.js"></script>

</body>
</html>
